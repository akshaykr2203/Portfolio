<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Resume Download Dropdown</title>

    <style>
      /* Main button box */
      .dropdown {
        position: relative;
        display: inline-block;
      }

      .dropbtn {
        background-color: black;
        color: white;
        padding: 12px 25px;
        font-size: 15px;
        font-weight: 600;
        border: none;
        cursor: pointer;
        border-radius: 4px;
        letter-spacing: 1px;
      }

      /* Dropdown content hidden */
      .dropdown-content {
        display: none;
        position: absolute;
        background-color: white;
        min-width: 180px;
        box-shadow: 0px 8px 15px rgba(0, 0, 0, 0.25);
        border-radius: 5px;
        z-index: 1;
      }

      /* Each option styling */
      .dropdown-content a {
        color: black;
        padding: 12px 15px;
        text-decoration: none;
        display: block;
        font-weight: 500;
      }

      .dropdown-content a:hover {
        background-color: #e9e9e9;
      }

      /* When hover, show menu */
      .dropdown:hover .dropdown-content {
        display: block;
      }

      /* Optional: change button on hover */
      .dropdown:hover .dropbtn {
        background-color: #222;
      }
    </style>
  </head>
  <body>
    <div class="dropdown">
      <button class="dropbtn">DOWNLOAD RESUME ▼</button>

      <div class="dropdown-content">
        <a href="resume.pdf" download>Download as PDF</a>
        <a href="resume.jpg" download>Download as JPG</a>
      </div>
    </div>
  </body>
</html>
